# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: mcp-context-forge
metadata:
  template: mcp-context-forge@0.0.1-beta
services:
  api:
    project: .
    language: docker
    host: containerapp
    docker:
      path: ./Containerfile
      context: .
      target: mcpgateway
    env:
      - AZURE_CLIENT_ID
      - AZURE_TENANT_ID
      - AZURE_AUTHORITY_HOST
      - API_AUDIENCE
      - DATABASE_URL
      - AZURE_KEY_VAULT_NAME
      - AUTH_TYPE=azure_ad
      - CORS_ENABLED=true
      - LOG_LEVEL=INFO
  web:
    project: .
    language: docker
    host: containerapp
    docker:
      path: ./Containerfile.web
      context: .
    env:
      - AZURE_CLIENT_ID
      - AZURE_TENANT_ID
      - AZURE_AUTHORITY_HOST
      - API_BASE_URL
      - WEB_REDIRECT_URI

hooks:
  predeploy:
    posix:
      shell: sh
      run: |
        echo "Building containers..."
    windows:
      shell: pwsh
      run: |
        Write-Host "Building containers..."

infra:
  provider: bicep
  path: infra

pipeline:
  provider: github
  variables:
    AZURE_CONTAINER_REGISTRY_ENDPOINT: ${{ secrets.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
